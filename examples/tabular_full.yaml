type: tabular
source: examples/data/source.csv
target: examples/data/target.csv
keys:
  - id
  - region

compare:
  include_columns: null
  exclude_columns:
    - internal_notes
  trim_whitespace: true
  case_insensitive: false
  normalize_nulls: ["", "NULL", "null"]

filters:
  exclude_keys:
    - { id: "999", region: "TEST" }
  row_filters:
    apply_to: both
    mode: exclude
    rules:
      - column: status
        op: equals
        value: deleted

ignore_columns:
  - updated_at

tolerance:
  amount: 0.01
  balance: 0.001

string_rules:
  name:
    - trim
    - case_insensitive

normalization:
  full_name:
    - op: concat
      args: ["first_name", " ", "last_name"]
    - op: trim
  amount_rounded:
    - op: round
      args: [amount, 2]

csv:
  delimiter: ","
  header: true
  encoding: utf-8

output:
  include_row_samples: true
  include_column_stats: true
